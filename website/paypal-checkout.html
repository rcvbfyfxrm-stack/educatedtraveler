<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — EDUCATEDTRAVELER</title>
    <meta name="description" content="Complete your cohort enrollment.">
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="400x400" href="/images/logo-et-icon.png">
    <link rel="apple-touch-icon" href="/images/logo-et-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #000; color: #fff; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); }
        #paypal-button-container { min-height: 180px; }
        /* PayPal renders a white panel on dark — give it a small frame */
        #paypal-wrap { background: rgba(255,255,255,0.97); border-radius: 14px; padding: 18px; }
        .pp-spinner {
            width: 28px; height: 28px;
            border: 2px solid rgba(255,255,255,0.18);
            border-top-color: rgba(255,255,255,0.85);
            border-radius: 50%;
            animation: ppspin 0.9s linear infinite;
            margin: 12px auto;
        }
        @keyframes ppspin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-6 py-12">

    <div class="max-w-md w-full">

        <a href="/offerings" class="text-xs uppercase tracking-[0.25em] text-white/40 hover:text-white/70 transition mb-8 inline-block">← Back to offerings</a>

        <p class="text-xs uppercase tracking-[0.3em] text-white/40 mb-2 font-mono">Secure checkout</p>
        <h1 class="text-3xl font-light mb-8">Complete enrollment</h1>

        <!-- Cohort summary -->
        <div id="summary" class="glass rounded-2xl p-6 mb-6">
            <div class="pp-spinner"></div>
            <p class="text-center text-white/50 text-sm">Loading cohort…</p>
        </div>

        <!-- PayPal Smart Buttons -->
        <div id="paypal-wrap" class="hidden">
            <div id="paypal-button-container"></div>
        </div>

        <p id="status" class="text-sm text-white/50 text-center mt-6 min-h-[1.25rem]"></p>

        <p class="text-xs text-white/30 text-center mt-8 leading-relaxed">
            Payment processed by PayPal. We never see your card details.<br>
            Questions? <a href="mailto:founder@educatedtraveler.app" class="underline hover:text-white/60">founder@educatedtraveler.app</a>
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-config.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/database.js"></script>
    <script src="/js/paypal-config.js"></script>

    <script>
        (function () {
            'use strict';

            const params = new URLSearchParams(window.location.search);
            const cohortId = params.get('cohort');

            const summaryEl = document.getElementById('summary');
            const wrapEl = document.getElementById('paypal-wrap');
            const statusEl = document.getElementById('status');

            function setStatus(msg, tone) {
                statusEl.textContent = msg || '';
                statusEl.style.color =
                    tone === 'error' ? '#fca5a5'
                    : tone === 'ok' ? '#86efac'
                    : 'rgba(255,255,255,0.5)';
            }

            function bail(msg) {
                summaryEl.innerHTML =
                    '<p class="text-red-300 text-sm text-center">' + msg + '</p>' +
                    '<p class="text-center mt-4"><a href="/offerings" class="text-xs uppercase tracking-[0.25em] text-white/50 underline">Back to offerings</a></p>';
            }

            if (!cohortId) {
                bail('Missing cohort. Open this page from an "Apply" button.');
                return;
            }

            // ---- 1. Wait for the modules we depend on ----
            function ready(cb, attempt) {
                attempt = attempt || 0;
                if (window.supabaseClient && window.auth && window.db && window.PAYPAL_CONFIG) {
                    cb();
                    return;
                }
                if (attempt > 200) {
                    bail('Could not load checkout modules. Please refresh.');
                    return;
                }
                setTimeout(() => ready(cb, attempt + 1), 50);
            }

            ready(async function () {
                // ---- 2. Require sign-in ----
                const user = await window.auth.getUser();
                if (!user) {
                    const ret = encodeURIComponent(window.location.pathname + window.location.search);
                    window.location.href = '/join.html?return=' + ret;
                    return;
                }

                // ---- 3. Render the cohort summary ----
                const { data: cohort, error } = await window.supabaseClient
                    .from('cohorts')
                    .select('id, title, description, location, price_cents, currency, start_date, end_date, status, instructors(name)')
                    .eq('id', cohortId)
                    .single();

                if (error || !cohort) {
                    bail('Cohort not found. It may have been unpublished.');
                    return;
                }
                if (cohort.status !== 'published') {
                    bail('This cohort is not open for enrollment right now.');
                    return;
                }

                const fmt = (iso) => iso
                    ? new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
                    : '';
                const dateRange = [fmt(cohort.start_date), fmt(cohort.end_date)].filter(Boolean).join(' — ') || 'Dates TBD';
                const price = cohort.price_cents
                    ? '$' + (cohort.price_cents / 100).toLocaleString()
                    : 'TBD';

                summaryEl.innerHTML =
                    '<p class="text-xs uppercase tracking-[0.2em] text-white/40 mb-2 font-mono">Cohort</p>' +
                    '<h2 class="text-lg font-medium mb-1">' + escapeHtml(cohort.title) + '</h2>' +
                    '<p class="text-white/60 text-sm">' + escapeHtml(cohort.location || '—') + ' · ' + escapeHtml(dateRange) + '</p>' +
                    (cohort.instructors?.name
                        ? '<p class="text-white/40 text-xs mt-1">with ' + escapeHtml(cohort.instructors.name) + '</p>'
                        : '') +
                    '<div class="border-t border-white/5 mt-4 pt-4 flex justify-between items-baseline">' +
                        '<span class="text-white/50 text-sm">Total</span>' +
                        '<span class="text-2xl font-light">' + escapeHtml(price) + '</span>' +
                    '</div>';

                // ---- 4. Load the PayPal SDK, then render Smart Buttons ----
                wrapEl.classList.remove('hidden');
                loadScript(window.PAYPAL_CONFIG.sdkUrl, function (err) {
                    if (err || !window.paypal) {
                        setStatus('Could not load PayPal. Try refreshing.', 'error');
                        return;
                    }

                    window.paypal.Buttons({
                        style: {
                            layout: 'vertical',
                            color: 'gold',
                            shape: 'pill',
                            label: 'paypal'
                        },

                        createOrder: async function () {
                            try {
                                setStatus('Creating order…');
                                const { order_id } = await window.db.createPayPalOrder(cohortId);
                                setStatus('');
                                return order_id;
                            } catch (e) {
                                console.error(e);
                                setStatus('Could not start payment: ' + e.message, 'error');
                                throw e;
                            }
                        },

                        onApprove: async function (data) {
                            try {
                                setStatus('Finalizing payment…');
                                await window.db.capturePayPalOrder(data.orderID);
                                window.location.href =
                                    '/enrollment-success.html?order=' +
                                    encodeURIComponent(data.orderID);
                            } catch (e) {
                                console.error(e);
                                setStatus(
                                    'Payment captured but our system had a hiccup. Email founder@educatedtraveler.app with this reference: ' + data.orderID,
                                    'error'
                                );
                            }
                        },

                        onCancel: function () {
                            setStatus('Payment cancelled. You can try again above.');
                        },

                        onError: function (err) {
                            console.error('PayPal Buttons error:', err);
                            setStatus('Payment error. Please try again or email us.', 'error');
                        }
                    }).render('#paypal-button-container').catch(function (err) {
                        console.error('PayPal render error:', err);
                        setStatus('Could not render PayPal buttons. Refresh to retry.', 'error');
                    });
                });
            });

            function loadScript(src, cb) {
                const s = document.createElement('script');
                s.src = src;
                s.onload = () => cb(null);
                s.onerror = () => cb(new Error('SDK load failed'));
                document.head.appendChild(s);
            }

            function escapeHtml(s) {
                const d = document.createElement('div');
                d.textContent = s == null ? '' : String(s);
                return d.innerHTML;
            }
        })();
    </script>
</body>
</html>
