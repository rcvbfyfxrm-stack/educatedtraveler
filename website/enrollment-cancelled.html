<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Cancelled — EDUCATEDTRAVELER</title>
    <meta name="description" content="Your spot is still available.">
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="400x400" href="/images/logo-et-icon.png">
    <link rel="apple-touch-icon" href="/images/logo-et-icon.png">
    <link rel="shortcut icon" href="/images/logo-et-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        h1,h2,h3 { font-family:'Fraunces',Georgia,serif; letter-spacing:-0.01em; }
        .mono,.font-mono { font-family:'IBM Plex Mono',monospace; }

        body { font-family: 'Inter', system-ui, sans-serif; background: #0d0b09; color: #fff; }
        .glass { background: rgba(243,237,226,0.025); backdrop-filter: blur(20px); border: 1px solid rgba(243,237,226,0.09); }
        .cta-button { background: linear-gradient(135deg, #5b8a89 0%, #7fa8a5 100%); transition: all 0.3s ease; }
        .cta-button:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(0,102,177,0.3); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-6 py-16">
    <div class="max-w-md w-full text-center">

        <div class="w-16 h-16 mx-auto mb-8 rounded-full flex items-center justify-center" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);">
            <svg class="w-7 h-7 text-white/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.75 9.75l4.5 4.5m0-4.5l-4.5 4.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        </div>

        <p class="text-xs uppercase tracking-[0.3em] text-white/40 mb-3 font-mono">Checkout cancelled</p>
        <h1 class="text-3xl md:text-4xl font-light mb-4">No charge made.</h1>

        <p class="text-white/60 text-sm leading-relaxed mb-8">
            Your spot wasn't held — you can try again whenever you're ready. If you had questions about pricing, payment plans, or scholarships, reply to us directly.
        </p>

        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a id="back-link" href="/" class="cta-button inline-block px-8 py-3.5 rounded-full text-white text-sm font-medium">Back to Cohort</a>
            <a href="mailto:founder@educatedtraveler.app?subject=Question%20before%20enrolling" class="inline-block px-8 py-3.5 rounded-full border border-white/20 text-white/70 hover:text-white hover:border-white/30 transition-colors text-sm font-medium">Ask a Question</a>
        </div>

    </div>

    <script>
        // Best-effort: send the user back to the page they came from if we know it.
        const params = new URLSearchParams(window.location.search);
        const cohort = params.get('cohort_id');
        const ref = document.referrer && new URL(document.referrer).origin === window.location.origin
            ? document.referrer
            : '/repertoire';
        document.getElementById('back-link').href = ref;
    </script>
</body>
</html>
