<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment received — EDUCATEDTRAVELER</title>
    <meta name="description" content="Your payment was received.">
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="400x400" href="/images/logo-et-icon.png">
    <link rel="apple-touch-icon" href="/images/logo-et-icon.png">
    <link rel="shortcut icon" href="/images/logo-et-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        h1,h2,h3 { font-family:'Fraunces',Georgia,serif; letter-spacing:-0.01em; }
        .mono,.font-mono { font-family:'IBM Plex Mono',monospace; }

        body { font-family: 'Inter', system-ui, sans-serif; background: #0d0b09; color: #fff; }
        .glass { background: rgba(243,237,226,0.025); backdrop-filter: blur(20px); border: 1px solid rgba(243,237,226,0.09); }
        .cta-button { background: linear-gradient(135deg, #5b8a89 0%, #7fa8a5 100%); transition: all 0.3s ease; }
        .cta-button:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(0,102,177,0.3); }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); } 50% { box-shadow: 0 0 0 24px rgba(16,185,129,0); } }
        .check-circle { animation: pulse-glow 2s ease-out 2; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-6 py-16">
    <div class="max-w-md w-full text-center">

        <div class="w-16 h-16 mx-auto mb-8 rounded-full check-circle flex items-center justify-center" style="background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.4);">
            <svg class="w-8 h-8 text-[#7fa8a5]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
        </div>

        <p id="eyebrow" class="text-xs uppercase tracking-[0.3em] text-[#7fa8a5]/70 mb-3 font-mono">Payment received</p>
        <h1 id="headline" class="text-3xl md:text-4xl font-light mb-4">Thank you.</h1>

        <p id="lead" class="text-white/60 text-sm leading-relaxed mb-8">
            We've received your payment and emailed you a receipt.
        </p>

        <div class="glass rounded-xl p-6 mb-8 text-left">
            <p class="text-xs uppercase tracking-wider text-white/40 mb-3 font-mono">What happens next</p>
            <ol id="next-steps" class="space-y-3 text-sm text-white/70"></ol>
        </div>

        <a href="/dashboard" class="cta-button inline-block px-8 py-3.5 rounded-full text-white text-sm font-medium">View Your Dashboard</a>

        <p class="text-white/30 text-xs mt-8">
            Reference: <span id="ref" class="font-mono">—</span>
        </p>
    </div>

    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var order = params.get('order') || params.get('session_id') || '';
            var kind = params.get('kind') || 'full'; // 'full' | 'deposit' | 'balance'
            if (order) document.getElementById('ref').textContent = order.slice(-12);

            var headline = document.getElementById('headline');
            var lead = document.getElementById('lead');
            var steps = document.getElementById('next-steps');

            var copy = {
                full: {
                    headline: "Payment received.",
                    lead: "We've got your payment in full and emailed you a receipt. Your seat is reserved while your instructor confirms it.",
                    steps: [
                        "Your instructor confirms your seat — you'll get an email the moment they do.",
                        "Once confirmed, you'll show as enrolled on your dashboard and the welcome packet follows.",
                        "Hold off on travel bookings until the packet confirms the exact start time and meeting point."
                    ]
                },
                deposit: {
                    headline: "Deposit received.",
                    lead: "Your 1/3 deposit is in and we've emailed you a receipt. Your seat is reserved while your instructor confirms it.",
                    steps: [
                        "Your instructor confirms your seat — you'll get an email the moment they do.",
                        "We'll email you a secure link to pay the balance, due at least one month before the class.",
                        "Hold off on travel bookings until your seat is confirmed and the packet lands."
                    ]
                },
                balance: {
                    headline: "You're all paid up.",
                    lead: "Your balance is settled — you're fully paid for this cohort.",
                    steps: [
                        "Watch your inbox for the welcome packet from your instructor.",
                        "Book your travel only after the packet confirms the exact start time and meeting point.",
                        "Reply to any of our emails with dietary, mobility, or visa questions."
                    ]
                }
            };

            var c = copy[kind] || copy.full;
            headline.textContent = c.headline;
            lead.textContent = c.lead;
            steps.innerHTML = c.steps.map(function (s, i) {
                var n = ('0' + (i + 1)).slice(-2);
                return '<li class="flex gap-3"><span class="text-[#7fa8a5] font-mono">' + n + '</span><span>' + s + '</span></li>';
            }).join('');
        })();
    </script>
</body>
</html>
