<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signing in... — EDUCATEDTRAVELER</title>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        * { -webkit-font-smoothing: antialiased; }
        body { font-family: 'Inter', system-ui, sans-serif; background: #0a0a0a; }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-up { animation: fadeUp 0.8s ease-out forwards; }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-6">

    <div class="text-center fade-up">
        <!-- Loading State -->
        <div id="loading-state">
            <div class="w-12 h-12 mx-auto mb-6 border-2 border-cyan-400/30 border-t-cyan-400 rounded-full spinner"></div>
            <h1 class="text-2xl font-light mb-2">Signing you in...</h1>
            <p class="text-white/50 text-sm">Just a moment while we verify your magic link.</p>
        </div>

        <!-- Success State -->
        <div id="success-state" class="hidden">
            <div class="text-5xl mb-6">&#x2728;</div>
            <h1 class="text-2xl font-light mb-2">Welcome aboard!</h1>
            <p class="text-white/50 text-sm mb-6">You're signed in. Redirecting to your dashboard...</p>
        </div>

        <!-- Password Reset State -->
        <div id="reset-state" class="hidden">
            <h1 class="text-2xl font-light mb-2">Set new password</h1>
            <p class="text-white/50 text-sm mb-6">Choose a new password for your account.</p>
            <form id="reset-form" class="space-y-4 max-w-sm mx-auto text-left">
                <input
                    type="password"
                    id="reset-password"
                    placeholder="New password (min 8 characters)"
                    required
                    minlength="8"
                    class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/20 text-white placeholder:text-white/30 text-sm"
                >
                <input
                    type="password"
                    id="reset-password-confirm"
                    placeholder="Confirm new password"
                    required
                    minlength="8"
                    class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/20 text-white placeholder:text-white/30 text-sm"
                >
                <button type="submit" id="reset-submit-btn" class="w-full px-6 py-3 rounded-xl text-sm font-medium text-white" style="background:linear-gradient(135deg,#059669 0%,#1d4ed8 100%);">
                    Update Password
                </button>
            </form>
            <p id="reset-error" class="text-red-400 text-xs mt-3 hidden"></p>
        </div>

        <!-- Error State -->
        <div id="error-state" class="hidden">
            <h1 class="text-2xl font-light mb-2">Something went wrong</h1>
            <p id="error-message" class="text-white/50 text-sm mb-6">We couldn't sign you in. The link may have expired.</p>
            <a href="/" class="inline-block px-6 py-3 rounded-full border border-white/20 hover:bg-white/5 transition-colors text-sm">
                Back to Home
            </a>
        </div>
    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-config.js"></script>

    <script>
        (async function() {
            const loadingState = document.getElementById('loading-state');
            const successState = document.getElementById('success-state');
            const resetState = document.getElementById('reset-state');
            const errorState = document.getElementById('error-state');
            const errorMessage = document.getElementById('error-message');

            // Check if this is a password recovery flow
            const hash = window.location.hash;
            const isRecovery = hash.includes('type=recovery');

            try {
                const supabase = window.supabaseClient;

                // Get the auth code from URL (Supabase handles this automatically via hash)
                const { data, error } = await supabase.auth.getSession();

                if (error) throw error;

                if (data.session) {
                    if (isRecovery) {
                        // Show password reset form
                        loadingState.classList.add('hidden');
                        resetState.classList.remove('hidden');

                        document.getElementById('reset-form').addEventListener('submit', async (e) => {
                            e.preventDefault();
                            const pw = document.getElementById('reset-password').value;
                            const confirm = document.getElementById('reset-password-confirm').value;
                            const resetError = document.getElementById('reset-error');
                            const submitBtn = document.getElementById('reset-submit-btn');

                            resetError.classList.add('hidden');

                            if (pw !== confirm) {
                                resetError.textContent = 'Passwords do not match.';
                                resetError.classList.remove('hidden');
                                return;
                            }
                            if (pw.length < 8) {
                                resetError.textContent = 'Password must be at least 8 characters.';
                                resetError.classList.remove('hidden');
                                return;
                            }

                            submitBtn.disabled = true;
                            submitBtn.textContent = 'Updating...';

                            try {
                                const { error: updateError } = await supabase.auth.updateUser({ password: pw });
                                if (updateError) throw updateError;

                                resetState.classList.add('hidden');
                                successState.querySelector('h1').textContent = 'Password updated!';
                                successState.querySelector('p').textContent = 'Redirecting to your dashboard...';
                                successState.classList.remove('hidden');

                                setTimeout(() => { window.location.href = '/dashboard.html'; }, 1500);
                            } catch (err) {
                                resetError.textContent = err.message || 'Failed to update password.';
                                resetError.classList.remove('hidden');
                                submitBtn.disabled = false;
                                submitBtn.textContent = 'Update Password';
                            }
                        });
                    } else {
                        // Normal sign-in success
                        loadingState.classList.add('hidden');
                        successState.classList.remove('hidden');
                        setTimeout(() => { window.location.href = '/dashboard.html'; }, 1500);
                    }
                } else {
                    // No session yet - wait for auth to complete from URL hash
                    const { data: authData, error: authError } = await supabase.auth.exchangeCodeForSession(window.location.href);

                    if (authError) throw authError;

                    if (authData.session) {
                        if (isRecovery) {
                            window.location.reload(); // Reload to hit the session branch above
                        } else {
                            loadingState.classList.add('hidden');
                            successState.classList.remove('hidden');
                            setTimeout(() => { window.location.href = '/dashboard.html'; }, 1500);
                        }
                    } else {
                        throw new Error('No session received');
                    }
                }
            } catch (err) {
                console.error('Auth callback error:', err);
                loadingState.classList.add('hidden');
                errorState.classList.remove('hidden');

                if (err.message) {
                    errorMessage.textContent = err.message;
                }
            }
        })();
    </script>
</body>
</html>
